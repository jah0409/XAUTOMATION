name: Free AI X Bot

on:
  schedule:
    - cron: "0 8,11,14,17,20 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore tweet history
        uses: actions/download-artifact@v4
        with:
          name: tweet-history
          path: data
        continue-on-error: true

      - name: Run bot once
        run: python src/main.py --once
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          POST_TIMES_UTC: "08:00,11:00,14:00,17:00,20:00"

      - name: Save tweet history
        uses: actions/upload-artifact@v4
        with:
          name: tweet-history
          path: data/tweet_history.json
          if-no-files-found: warn
